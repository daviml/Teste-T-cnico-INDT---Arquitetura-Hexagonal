name: indt-insurance

# Ambiente completo do desafio: PostgreSQL (um servidor, dois bancos isolados
# por serviço), RabbitMQ (com management UI) e os dois microserviços.
# `docker-compose up --build` sobe tudo.
#
# As variáveis usam defaults (${VAR:-valor}) com placeholders de DEV, então o
# compose sobe direto do clone, sem precisar de `.env`. Para customizar (ou em
# produção), copie `.env.example` para `.env` e ajuste — os valores do `.env`
# têm precedência sobre os defaults abaixo.

services:
  postgres:
    image: postgres:17-alpine
    container_name: indt-postgres
    restart: unless-stopped
    environment:
      # Superusuário (bootstrap/administração).
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      # Repassadas ao script em docker/postgres/init.
      PROPOSTA_DB_NAME: ${PROPOSTA_DB_NAME:-propostas_db}
      PROPOSTA_DB_USER: ${PROPOSTA_DB_USER:-proposta_app}
      PROPOSTA_DB_PASSWORD: ${PROPOSTA_DB_PASSWORD:-proposta_dev_pwd}
      CONTRATACAO_DB_NAME: ${CONTRATACAO_DB_NAME:-contratacoes_db}
      CONTRATACAO_DB_USER: ${CONTRATACAO_DB_USER:-contratacao_app}
      CONTRATACAO_DB_PASSWORD: ${CONTRATACAO_DB_PASSWORD:-contratacao_dev_pwd}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - indt-net

  rabbitmq:
    image: rabbitmq:4-management
    container_name: indt-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    ports:
      - "5672:5672"    # AMQP (aplicações)
      - "15672:15672"  # Management UI (http://localhost:15672)
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - indt-net

  # UI web para inspecionar o PostgreSQL pelo navegador (conveniência de dev).
  adminer:
    image: adminer:5
    container_name: indt-adminer
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "8080:8080"  # http://localhost:8080
    depends_on:
      - postgres
    networks:
      - indt-net

  proposta-service:
    build:
      context: .
      dockerfile: src/PropostaService/PropostaService.API/Dockerfile
    container_name: indt-proposta-service
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 8080
      # Hostnames internos da rede do compose (postgres/rabbitmq) sobrescrevem
      # os valores de appsettings via convenção ConnectionStrings__/RabbitMq__.
      ConnectionStrings__Propostas: "Host=postgres;Port=5432;Database=${PROPOSTA_DB_NAME:-propostas_db};Username=${PROPOSTA_DB_USER:-proposta_app};Password=${PROPOSTA_DB_PASSWORD:-proposta_dev_pwd}"
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: ${RABBITMQ_DEFAULT_USER:-guest}
      RabbitMq__Password: ${RABBITMQ_DEFAULT_PASS:-guest}
    ports:
      - "5237:8080"  # http://localhost:5237 (Swagger em /swagger)
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - indt-net

  contratacao-service:
    build:
      context: .
      dockerfile: src/ContratacaoService/ContratacaoService.API/Dockerfile
    container_name: indt-contratacao-service
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 8080
      ConnectionStrings__Contratacoes: "Host=postgres;Port=5432;Database=${CONTRATACAO_DB_NAME:-contratacoes_db};Username=${CONTRATACAO_DB_USER:-contratacao_app};Password=${CONTRATACAO_DB_PASSWORD:-contratacao_dev_pwd}"
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: ${RABBITMQ_DEFAULT_USER:-guest}
      RabbitMq__Password: ${RABBITMQ_DEFAULT_PASS:-guest}
      # Consulta síncrona à proposta usa o nome do serviço na rede interna.
      PropostaService__BaseUrl: "http://proposta-service:8080"
    ports:
      - "5134:8080"  # http://localhost:5134 (Swagger em /swagger)
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      proposta-service:
        condition: service_started
    networks:
      - indt-net

volumes:
  postgres-data:
  rabbitmq-data:

networks:
  indt-net:
    driver: bridge
