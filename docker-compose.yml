name: indt-insurance

# Infraestrutura local do desafio: PostgreSQL (um servidor, dois bancos
# isolados por serviço) e RabbitMQ (com management UI). Os microserviços
# em si serão adicionados em commits posteriores, quando tiverem Dockerfile.

services:
  postgres:
    image: postgres:17-alpine
    container_name: indt-postgres
    restart: unless-stopped
    environment:
      # Superusuário (bootstrap/administração).
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Repassadas ao script em docker/postgres/init.
      PROPOSTA_DB_NAME: ${PROPOSTA_DB_NAME}
      PROPOSTA_DB_USER: ${PROPOSTA_DB_USER}
      PROPOSTA_DB_PASSWORD: ${PROPOSTA_DB_PASSWORD}
      CONTRATACAO_DB_NAME: ${CONTRATACAO_DB_NAME}
      CONTRATACAO_DB_USER: ${CONTRATACAO_DB_USER}
      CONTRATACAO_DB_PASSWORD: ${CONTRATACAO_DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - indt-net

  rabbitmq:
    image: rabbitmq:4-management
    container_name: indt-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"    # AMQP (aplicações)
      - "15672:15672"  # Management UI (http://localhost:15672)
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - indt-net

volumes:
  postgres-data:
  rabbitmq-data:

networks:
  indt-net:
    driver: bridge
